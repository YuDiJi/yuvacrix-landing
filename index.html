<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────── -->
    <title>YuvaCrix – Cricket Scoring App & Tournament Management</title>
    <meta
      name="description"
      content="YuvaCrix is a free cricket scoring app to organize tournaments, track live scores, view scorecards, player stats, and awards — just like CricHeroes. Built for India's cricket community."
    />
    <meta
      name="keywords"
      content="cricket scoring app, cricket tournament management, live cricket scorecard, cricket app India, online cricket scores, player stats cricket, cricket tournament organizer"
    />
    <meta name="author" content="YuvaCrix" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.yuvacrix.in/" />

    <!-- ── Favicon / Icons ──────────────────────────────────── -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Open Graph (WhatsApp, Facebook, LinkedIn) ────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.yuvacrix.in/" />
    <meta
      property="og:title"
      content="YuvaCrix – Cricket Scoring App & Tournament Management"
    />
    <meta
      property="og:description"
      content="Organize tournaments, track live scores, view scorecards and player awards. YuvaCrix is India's cricket scoring and tournament management app."
    />
    <meta property="og:image" content="https://www.yuvacrix.in/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="YuvaCrix" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter / X Card ─────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.yuvacrix.in/" />
    <meta
      name="twitter:title"
      content="YuvaCrix – Cricket Scoring App & Tournament Management"
    />
    <meta
      name="twitter:description"
      content="Organize tournaments, track live scores, view scorecards and player awards. YuvaCrix is India's cricket scoring and tournament management app."
    />
    <meta name="twitter:image" content="https://www.yuvacrix.in/og-image.jpg" />

    <!-- ── Structured Data (JSON-LD) ────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "YuvaCrix",
        "url": "https://www.yuvacrix.in",
        "description": "YuvaCrix is a cricket scoring and tournament management app. Organize tournaments, add live scores, view scorecards, track player stats, and earn awards.",
        "applicationCategory": "SportsApplication",
        "operatingSystem": "Android, iOS",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        },
        "inLanguage": "en-IN",
        "audience": {
          "@type": "Audience",
          "geographicArea": {
            "@type": "Country",
            "name": "India"
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
